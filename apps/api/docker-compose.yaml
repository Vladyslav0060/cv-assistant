services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    container_name: db
    volumes:
      - db:/var/lib/postgresql/data
    ports:
      - '${DB_PORT}:${DB_PORT}'
    networks:
      - app-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 0

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cv-api-container
    environment:
      - '${PORT}:${PORT}'
    depends_on:
      - db
    volumes:
      - ./src:/app/src
    networks:
      - app-net
    healthcheck:
      test: ['CMD-SHELL', 'curl', '-f', 'http:localhost:3000/healthcheck']
      interval: 10s
      timeout: 5s
      retries: 0

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    container_name: pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
    ports:
      - '${PGADMIN_HOST_PORT}:${PGADMIN_CONTAINER_PORT}'
    depends_on:
      - db
    networks:
      - app-net

  redis:
    image: redis:latest
    container_name: redis-container
    ports:
      - '${REDIS_PORT}:${REDIS_PORT}'
    networks:
      - app-net
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping', '']
      interval: 10s
      timeout: 5s
      retries: 0

networks:
  app-net:
    driver: bridge

volumes:
  db:
